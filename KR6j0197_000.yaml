body:
  text: 大寶廣博樓閣善住祕密陀羅尼經大寶廣博樓閣善住祕密陀羅尼輪曩莫薩嚩怛他孽多南唵尾補攞孽陛麼抳鉢囉陛怛他多儞捺捨寧摩抳摩抳蘇鉢囉陛尾麼黎娑孽囉儼鼻㘑吽吽入嚩攞入嚩攞沒馱尾盧枳帝麌呬夜地瑟恥多孽陛娑縛訶經云此陀羅尼有大威德佛由此成道由此降魔能滅惡障能成六度若書紙素牌壁幢閣之上有人暫視讀誦受持及聞聲佩身並轉觸餘人是人五逆四重十惡等罪消滅無有刀毒水火劫賊邪魅瘧疫寒熱一切病苦皆悉遠離見獲福慶所求遂意臨命終時諸佛安慰得生淨土所有禽獸飛蛾蚊虻蟲等遇影蒙塵皆得解脫
